<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resumes</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>

<header>
  <nav>
    <a href="projects.html">Projects</a>
    <a href="upload.html">Upload</a>
    <a href="portfolio.html">Portfolio</a>
    <a class="active" href="resumes.html">Resumes</a>
  </nav>
</header>

<main>
  <h1>Resume Manager</h1>

  <!-- Tab links -->
  <div class="tab-links">
    <button onclick="showTab('generate')">Generate Resume</button>
    <button onclick="showTab('view')">View Resume</button>
    <button onclick="showTab('edit')">Edit Resume</button>
  </div>

  <!-- Tab content -->
  <section id="generate" class="tab-content">
    <h2>Generate Resume</h2>
    <input type="number" id="genProjectId" placeholder="Project ID" />
    <input type="number" id="numBullets" placeholder="Number of bullets" value="3" />
    <button onclick="generateResume()">Generate</button>
    <pre id="generateResult"></pre>
  </section>

  <section id="view" class="tab-content" style="display:none;">
    <h2>View Resume</h2>
    <input type="number" id="viewProjectId" placeholder="Project ID" />
    <button onclick="getResume()">View</button>
    <pre id="resumeDisplay"></pre>
  </section>

  <section id="edit" class="tab-content" style="display:none;">
    <h2>Edit Resume</h2>
    <input type="number" id="editProjectId" placeholder="Project ID" />
    <input type="text" id="resumeHeader" placeholder="Optional header" />
    <textarea id="resumeBullets" placeholder="One bullet per line"></textarea>
    <button onclick="editResume()">Save Changes</button>
    <pre id="editResult"></pre>
  </section>

</main>

</body>
</html>
