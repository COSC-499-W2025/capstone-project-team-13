<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View All Projects</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <h1>Digital Artifact Mining</h1>
    <nav>
      <a href="index.html">All Projects</a>
      <a href="upload.html">Upload & Analyze</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="resumes.html">Resumes</a>
    </nav>
    <div class="account-icon" id="account-icon">
      <i class="fa-solid fa-user"></i>
    </div>

    <script>
    const accountIcon = document.getElementById('account-icon');

    async function setProfileLink() {
        try {
            const res = await fetch('/auth/me', {
                method: 'GET',
                credentials: 'include'
            });
            if (res.ok) {
                // User is logged in → go to profile
                accountIcon.addEventListener('click', () => {
                    window.location.href = 'userProfile.html';
                });
                accountIcon.title = "Go to your profile";
            } else {
                // Not logged in → go to login
                accountIcon.addEventListener('click', () => {
                    window.location.href = 'login.html';
                });
                accountIcon.title = "Click to log in";
            }
        } catch (err) {
            console.error(err);
            accountIcon.addEventListener('click', () => window.location.href = 'login.html');
        }
    }

    setProfileLink();
    </script>
  </header>

  <main>
    <div class="container">
      <h2>All Projects</h2>
      <p>List all projects here. You can fetch them from your API and display dynamically.</p>
    </div>
  </main>
</body>
</html>
