<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - Digital Artifact Mining</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="register-container">
    <h1>Create Your Account</h1>
    <form id="signupForm">
      <input type="text" name="first_name" placeholder="First Name" required><br><br>
      <input type="text" name="last_name" placeholder="Last Name" required><br><br>
      <input type="email" name="email" placeholder="Email" required><br><br>
      <input type="password" name="password" placeholder="Password (min 6 chars)" required><br><br>
      <button type="submit">Create Account</button>
    </form>
    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const payload = {
        first_name: form.first_name.value,
        last_name: form.last_name.value,
        email: form.email.value,
        password: form.password.value
      };

      try {
        const res = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include'
        });

        if (res.ok) {
          const data = await res.json();
          alert(`Account created! Welcome, ${data.user.first_name}`);
          window.location.href = 'index.html'; // redirect to dashboard or main page
        } else {
          const error = await res.json();
          alert('Signup failed: ' + error.detail);
        }
      } catch (err) {
        console.error(err);
        alert('Signup error. Check console.');
      }
    });
  </script>
</body>
</html>
