<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Digital Artifact Mining</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-container">
    <h1>Welcome to Digital Artifact Mining</h1>

    <div id="auth-options">
      <button onclick="showLoginForm()">Login with Password</button>
      <button onclick="window.location.href='register.html'">Create Account</button>
    </div>

    <div id="login-form" style="display:none;">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
      </form>
      <button onclick="showAuthOptions()">Back</button>
    </div>
  </div>

  <script>
    function showLoginForm() {
      document.getElementById('auth-options').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    }

    function showAuthOptions() {
      document.getElementById('auth-options').style.display = 'block';
      document.getElementById('login-form').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const email = form.email.value;
      const password = form.password.value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include' // important if using cookies
        });

        if (res.ok) {
          const data = await res.json();
          console.log('Logged in user:', data.user);
          // Redirect to main dashboard after login
          window.location.href = 'index.html';
        } else {
          const error = await res.json();
          alert('Login failed: ' + error.detail);
        }
      } catch (err) {
        console.error(err);
        alert('Login error. Check console for details.');
      }
    });
  </script>
</body>
</html>
